name: Test basic usage - update license year
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a LICENSE file with an outdated copyright year
        run: |
          cat > /tmp/test-license/LICENSE << 'EOF'
          MIT License

          Copyright (c) 2020 Test Author

          Permission is hereby granted, free of charge, to any person obtaining a copy
          of this software and associated documentation files (the "Software"), to deal
          in the Software without restriction.
          EOF
          mkdir -p /tmp/test-license

      - name: Create LICENSE file in workspace
        run: |
          mkdir -p /tmp/test-license
          cat > /tmp/test-license/LICENSE << 'EOF'
          MIT License

          Copyright (c) 2020 Test Author

          Permission is hereby granted, free of charge, to any person obtaining a copy
          of this software and associated documentation files (the "Software"), to deal
          in the Software without restriction.
          EOF

      - name: Copy LICENSE to workspace
        run: |
          cp /tmp/test-license/LICENSE "$GITHUB_WORKSPACE/LICENSE"

      - id: action
        uses: .
        with:
          token: fake-token-for-testing
          path: LICENSE
          branchName: license/copyright-to-{{currentYear}}
          commitTitle: "docs(license): update copyright year(s)"
          commitAuthorName: github-actions
          commitAuthorEmail: github-actions@github.com
        continue-on-error: true

      - name: Assert action ran (outputs or graceful failure)
        env:
          CURRENT_YEAR: ${{ steps.action.outputs.currentYear }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "currentYear output: $CURRENT_YEAR"
          # The action may fail due to no real GitHub token/API access in act,
          # but it should at least have started (not a missing input error).
          # A 'failure' outcome from GitHub API errors is acceptable here.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
